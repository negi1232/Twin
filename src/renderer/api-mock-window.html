<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>API Mock Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .header-status {
      font-size: 13px;
      color: #6c7086;
    }

    .header-status.active {
      color: #a6e3a1;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Buttons ── */
    .btn {
      padding: 6px 16px;
      border: 1px solid #313244;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: #45475a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: #89b4fa;
      color: #1e1e2e;
      border-color: #89b4fa;
      font-weight: 600;
    }

    .btn-primary:hover { background: #74c7ec; border-color: #74c7ec; }

    .btn-danger {
      border-color: #f38ba8;
      color: #f38ba8;
      background: transparent;
    }

    .btn-danger:hover { background: #f38ba81a; }

    .btn-capture {
      background: #a6e3a1;
      color: #1e1e2e;
      border-color: #a6e3a1;
      font-weight: 600;
    }

    .btn-capture:hover { background: #94e2d5; border-color: #94e2d5; }

    .btn-capture.stopping {
      background: #f38ba8;
      border-color: #f38ba8;
    }

    .btn-capture.stopping:hover { background: #eba0ac; border-color: #eba0ac; }

    /* ── Select ── */
    .version-select {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6c7086;
    }

    .version-select select {
      padding: 4px 8px;
      border: 1px solid #313244;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .version-select select:focus { border-color: #89b4fa; }

    /* ── Info bar ── */
    .info-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 20px;
      background: #181825;
      border-bottom: 1px solid #313244;
      font-size: 13px;
      color: #6c7086;
      flex-shrink: 0;
    }

    .info-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .info-stat-value {
      font-weight: 700;
      color: #cdd6f4;
      font-size: 16px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #6c7086;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #a6adc8; }
    .tab-btn.active { color: #89b4fa; border-bottom-color: #89b4fa; }

    /* ── Main content area ── */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left-panel {
      width: 300px;
      min-width: 200px;
      max-width: 600px;
      overflow-y: auto;
      border-right: 1px solid #313244;
      flex-shrink: 0;
    }

    .left-panel::-webkit-scrollbar { width: 6px; }
    .left-panel::-webkit-scrollbar-track { background: transparent; }
    .left-panel::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }

    /* ── Resize handle ── */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .resize-handle:hover,
    .resize-handle.dragging { background: #89b4fa; }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      min-width: 0;
    }

    .right-panel::-webkit-scrollbar { width: 6px; }
    .right-panel::-webkit-scrollbar-track { background: transparent; }
    .right-panel::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }

    /* ── Timeline item ── */
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #313244;
      cursor: pointer;
      transition: background 0.1s;
    }

    .timeline-item:hover { background: #313244; }
    .timeline-item.selected { background: #313244; border-left: 3px solid #89b4fa; padding-left: 11px; }

    .timeline-time {
      font-size: 11px;
      color: #6c7086;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      flex-shrink: 0;
      width: 60px;
    }

    .timeline-info {
      flex: 1;
      min-width: 0;
    }

    .timeline-path {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Method badge ── */
    .method-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
      min-width: 42px;
      text-align: center;
    }

    .method-GET { background: #a6e3a133; color: #a6e3a1; }
    .method-POST { background: #89b4fa33; color: #89b4fa; }
    .method-PUT { background: #fab38733; color: #fab387; }
    .method-PATCH { background: #f9e2af33; color: #f9e2af; }
    .method-DELETE { background: #f38ba833; color: #f38ba8; }

    /* ── Status badge ── */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .status-2xx { color: #a6e3a1; }
    .status-3xx { color: #89b4fa; }
    .status-4xx { color: #f9e2af; }
    .status-5xx { color: #f38ba8; }

    /* ── Directory view ── */
    .dir-group {
      border-bottom: 1px solid #313244;
    }

    .dir-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
      font-weight: 600;
    }

    .dir-group-header:hover { background: #313244; }

    .dir-group-arrow {
      font-size: 10px;
      color: #6c7086;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .dir-group.open .dir-group-arrow { transform: rotate(90deg); }

    .dir-group-path {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: #cdd6f4;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dir-group-count {
      font-size: 11px;
      color: #6c7086;
      background: #313244;
      padding: 1px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .dir-entries {
      display: none;
    }

    .dir-group.open .dir-entries {
      display: block;
    }

    .dir-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px 8px 34px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 12px;
      border-bottom: 1px solid #2a2a3c;
    }

    .dir-entry:hover { background: #313244; }
    .dir-entry.selected { background: #313244; border-left: 3px solid #89b4fa; padding-left: 31px; }

    .dir-entry-time {
      font-size: 11px;
      color: #6c7086;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    /* ── Detail panel ── */
    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6c7086;
      font-size: 14px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #313244;
      flex-wrap: wrap;
    }

    .detail-url {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      color: #cdd6f4;
      word-break: break-all;
      flex: 1;
    }

    .detail-timestamp {
      font-size: 12px;
      color: #6c7086;
      width: 100%;
      margin-top: 4px;
    }

    /* ── Collapsible section ── */
    .section {
      border-bottom: 1px solid #313244;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #a6adc8;
      transition: background 0.1s;
      user-select: none;
    }

    .section-header:hover { background: #2a2a3c; }

    .section-arrow {
      font-size: 10px;
      color: #6c7086;
      transition: transform 0.15s;
    }

    .section.open .section-arrow { transform: rotate(90deg); }

    .section-body {
      display: none;
      padding: 0 20px 12px;
    }

    .section.open .section-body { display: block; }

    /* ── Headers table ── */
    .headers-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .headers-table tr { border-bottom: 1px solid #2a2a3c; }

    .headers-table td {
      padding: 4px 8px;
      vertical-align: top;
    }

    .headers-table td:first-child {
      color: #89b4fa;
      font-weight: 600;
      white-space: nowrap;
      width: 1%;
    }

    .headers-table td:last-child {
      color: #cdd6f4;
      word-break: break-all;
    }

    /* ── JSON viewer ── */
    .json-viewer {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      background: #11111b;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
    }

    .json-key { color: #89b4fa; }
    .json-string { color: #a6e3a1; }
    .json-number { color: #fab387; }
    .json-boolean { color: #cba6f7; }
    .json-null { color: #6c7086; }

    .json-plain {
      color: #cdd6f4;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #6c7086;
      gap: 12px;
      padding: 40px;
    }

    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-title { font-size: 18px; font-weight: 600; color: #a6adc8; }

    .empty-text {
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
      max-width: 400px;
    }

    .empty-steps {
      margin-top: 8px;
      text-align: left;
      font-size: 13px;
      line-height: 2;
    }

    .empty-steps span { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      transition: opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.visible { opacity: 1; pointer-events: auto; }
    .toast.success { background: #a6e3a1; color: #1e1e2e; }
    .toast.error { background: #f38ba8; color: #1e1e2e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">API Mock Capture</div>
    <div id="capture-status" class="header-status">Stopped</div>
    <div class="header-actions">
      <div class="version-select">
        <span>MSW:</span>
        <select id="msw-version">
          <option value="v2">v2</option>
          <option value="v1">v1</option>
        </select>
      </div>
      <button id="export-btn" class="btn btn-primary" disabled>Export</button>
      <button id="clear-btn" class="btn btn-danger" disabled>Clear</button>
      <button id="capture-btn" class="btn btn-capture">Start Capture</button>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-stat">
      <span class="info-stat-value" id="request-count">0</span>
      <span>requests</span>
    </div>
    <div class="info-stat">
      <span class="info-stat-value" id="endpoint-count">0</span>
      <span>endpoints</span>
    </div>
  </div>

  <div id="content-wrapper" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
    <div class="tab-bar">
      <button id="tab-timeline" class="tab-btn active">Timeline</button>
      <button id="tab-directory" class="tab-btn">Directory</button>
    </div>
    <div class="main-content">
      <div id="left-panel" class="left-panel"></div>
      <div id="resize-handle" class="resize-handle"></div>
      <div id="right-panel" class="right-panel">
        <div class="detail-empty">Select a request to view details</div>
      </div>
    </div>
  </div>

  <div id="empty-state" class="empty-state">
    <div class="empty-icon">&#x1F4E1;</div>
    <div class="empty-title">Ready to capture</div>
    <div class="empty-text">
      左パネルの API リクエスト (XHR/Fetch) を自動キャプチャし、<br>
      MSW ハンドラーとしてエクスポートします。
    </div>
    <div class="empty-steps">
      <span>1. 「Start Capture」をクリックしてキャプチャ開始</span>
      <span>2. Twin の左パネルでページを操作して API を呼び出す</span>
      <span>3. 「Export」ボタンで MSW ハンドラーを生成</span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="scripts/api-mock-window.js"></script>
</body>
</html>
